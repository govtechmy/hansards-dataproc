name: Push Hansards to public for review
on:
  push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run action
        uses: andrewthetechie/gha-clone-releases@v1.7.0
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          src_repo: data-gov-my/dataproc-hansard
          dst_repo: jeqcho/public-hansard-review
          copy_assets: true
